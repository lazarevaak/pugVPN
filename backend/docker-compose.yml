services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pugvpn-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:8080"
    # Provisioning via SSH needs access to your private key.
    volumes:
      - ${HOME}/.ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
